<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BhashaBridge - AI Translator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --primary: #007AFF;
            --primary-hover: #0056b3;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.5);
            --bot-bubble: #f1f2f6;
            --user-bubble: #007AFF;
            --text-dark: #2d3436;
            --text-light: #ffffff;
            --text-muted: #636e72;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 20px;
        }

        .chat-header {
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .header-title {
            display: flex;
            flex-direction: column;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 600;
            color: #111;
        }

        .header-title span {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 2px;
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.bot {
            align-self: flex-start;
        }

        .bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .user .bubble {
            background-color: var(--user-bubble);
            color: var(--text-light);
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background-color: var(--bot-bubble);
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
        }

        .bot-section {
            margin-bottom: 8px;
        }
        
        .bot-section:last-child {
            margin-bottom: 0;
        }

        .bot-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .bot-text {
            font-size: 1rem;
            color: #111;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 4px 8px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #888;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .chat-input-area {
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.95);
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .lang-select-wrapper {
            position: relative;
        }

        select {
            appearance: none;
            background-color: #f1f2f6;
            border: 1px solid #dfe4ea;
            padding: 14px 36px 14px 16px;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        select:focus, select:hover {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
        }

        .lang-select-wrapper::after {
            content: "▼";
            font-size: 0.7rem;
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            pointer-events: none;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            background-color: #f1f2f6;
            border: 1px solid #dfe4ea;
            padding: 14px 20px;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: var(--text-dark);
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
        }

        input[type="text"]::placeholder {
            color: #a4b0be;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: scale(0.95);
        }
        
        button:disabled {
            background-color: #a4b0be;
            cursor: not-allowed;
            transform: none;
        }

        button svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transform: translateX(1px); /* Slight optical alignment */
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0,0,0,0.2);
        }
        
        @media (max-width: 600px) {
            .chat-container {
                height: 100vh;
                margin: 0;
                border-radius: 0;
                border: none;
            }
            .chat-input-area {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-title">
                <h1>BhashaBridge</h1>
                <span>AI Translation & Grammar</span>
            </div>
            <div style="width: 40px; height: 40px; background: rgba(0,122,255,0.1); border-radius: 50%; display:flex; align-items:center; justify-content:center;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <!-- Welcome Message -->
            <div class="message bot">
                <div class="bubble">
                    Hello! I am BhashaBridge. Type a sentence, and I will correct its grammar and translate it for you.
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="lang-select-wrapper">
                <select id="targetLanguage">
                    <option value="Hindi">Hindi</option>
                    <option value="Marathi">Marathi</option>
                    <option value="English">English</option>
                </select>
            </div>
            <div class="input-wrapper">
                <input type="text" id="inputText" placeholder="Type a message..." autocomplete="off" onkeypress="handleKeyPress(event)">
            </div>
            <button id="sendBtn" onclick="handleSend()">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const inputText = document.getElementById('inputText');
        const targetLanguage = document.getElementById('targetLanguage');
        const sendBtn = document.getElementById('sendBtn');

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendUserMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user';
            msgDiv.innerHTML = `<div class="bubble">${escapeHTML(text)}</div>`;
            chatMessages.appendChild(msgDiv);
            scrollToBottom();
        }

        function appendBotMessage(corrected, translated) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot';
            
            let htmlContent = `<div class="bubble">`;
            if (corrected && corrected.trim() !== "" && corrected !== "No correction needed.") {
                htmlContent += `
                    <div class="bot-section">
                        <div class="bot-label">Corrected Text</div>
                        <div class="bot-text">${escapeHTML(corrected)}</div>
                    </div>
                    <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.1); margin: 8px 0;">
                `;
            }
            htmlContent += `
                <div class="bot-section">
                    <div class="bot-label">Translated to ${targetLanguage.value}</div>
                    <div class="bot-text"><strong>${escapeHTML(translated)}</strong></div>
                </div>
            </div>`;
            
            msgDiv.innerHTML = htmlContent;
            chatMessages.appendChild(msgDiv);
            scrollToBottom();
        }

        function appendBotError(errorText) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot';
            msgDiv.innerHTML = `<div class="bubble" style="color: #e74c3c; background: #fadbd8;"><strong>Error:</strong> ${escapeHTML(errorText)}</div>`;
            chatMessages.appendChild(msgDiv);
            scrollToBottom();
        }

        function showLoading() {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot loading-bubble';
            msgDiv.id = 'loadingIndicator';
            msgDiv.innerHTML = `
                <div class="bubble">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatMessages.appendChild(msgDiv);
            scrollToBottom();
        }

        function removeLoading() {
            const loader = document.getElementById('loadingIndicator');
            if (loader) {
                loader.remove();
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                handleSend();
            }
        }

        async function handleSend() {
            const text = inputText.value.trim();
            const lang = targetLanguage.value;

            if (!text) return;

            // Update UI
            appendUserMessage(text);
            inputText.value = '';
            inputText.focus();
            sendBtn.disabled = true;
            targetLanguage.disabled = true;
            
            showLoading();

            try {
                // Call API
                const response = await fetch('http://127.0.0.1:8000/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        target_language: lang
                    })
                });

                if (!response.ok) {
                    throw new Error(`Server Error: ${response.status}`);
                }

                const data = await response.json();
                
                removeLoading();
                appendBotMessage(data.corrected_text, data.translated_text);

            } catch (error) {
                removeLoading();
                console.error("Translation Error:", error);
                appendBotError("Could not connect to the translation server. Is it running?");
            } finally {
                sendBtn.disabled = false;
                targetLanguage.disabled = false;
            }
        }
    </script>
</body>
</html>
